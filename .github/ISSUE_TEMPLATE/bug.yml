name: Bug Report
description: Report an issue that should be fixed
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for submitting a bug report.
  - type: input
    attributes:
      label: What version are you using?
      description: Copy the relevant version from your `package.json` or lockfile.
  - type: dropdown
    attributes:
      label: What kind of platform do you use?
      options:
        - MacOS
        - Windows
        - Linux
  - type: textarea
    attributes:
      label: What steps can reproduce the bug?
      description: |
        Explain the bug and provide a code snippet that can reproduce it.
        Please add a link to a minimal reproduction.
        - To create a shareable code example, use CodeSandbox (https://codesandbox.io/s/new) or Stackblitz (https://stackblitz.com/).
        - For TypeScript-related issues only, a TypeScript Playground link might be sufficient: https://www.typescriptlang.org/play
        - Please read these tips for providing a minimal example: https://stackoverflow.com/help/mcve
    validations:
      required: true
  - type: dropdown
    attributes:
      label: How often does this bug happen?
      options:
        - Every time
        - Often
        - Sometimes
        - Only once
  - type: textarea
    attributes:
      label: What is the expected behavior?
      description: If possible, please provide text instead of a screenshot.
  - type: textarea
    attributes:
      label: Additional information
      description: Is there anything else you think we should know?
