name: Setup
description: Sets up pnpm, Node, dependencies, and (optionally) a Turbo cache.

# NOTE: local composite actions cannot call other actions that use a `pre:`
# lifecycle hook (e.g. step-security/harden-runner,
# rharkor/caching-for-turbo). If you want runner hardening or a network
# Turbo cache, add those actions directly in your workflow, BEFORE this
# composite is invoked.

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true
  cache:
    description: 'Local Turbo cache: "turbo" (default) restores/saves node_modules/.cache/turbo; "false" skips it.'
    required: false
    default: 'turbo'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: Setup git user
      shell: bash
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Cache Turbo
      if: ${{ inputs.cache == 'turbo' }}
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: node_modules/.cache/turbo
        key: ${{ runner.os }}-turbo-${{ github.event.repository.name }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-${{ github.event.repository.name }}-
