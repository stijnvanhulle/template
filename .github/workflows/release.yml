name: Release
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode (version = PR only; staged = stage on npm; publish = release to latest)'
        type: choice
        options: [version, staged, publish]
        default: version
      tag:
        description: 'Optional: Custom tag for canary release'
        required: false
        type: string
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'
      - '.github/workflows/release.yml'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version Packages
    if: github.repository_owner == 'stijnvanhulle' && github.event.inputs.tag == ''
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'
          cache: 'false'

      - name: Create Version Packages PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm exec changeset version
          commit: 'ci(changesets): version packages'
          title: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  canary:
    name: Publish canary
    if: github.repository_owner == 'stijnvanhulle' && (github.event_name == 'push' || github.event.inputs.tag != '')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'
          cache: 'false'

      - name: Build
        run: pnpm run build

      - name: Publish canary snapshot
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANARY_TAG: ${{ github.event.inputs.tag || 'canary' }}
        run: |
          pnpm exec changeset version --snapshot "$CANARY_TAG"
          pnpm exec changeset publish --no-git-tag --tag "$CANARY_TAG"

  release:
    name: Release
    needs: [version]
    if: |
      always() &&
      github.repository_owner == 'stijnvanhulle' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'version') &&
      needs.version.result == 'success' && needs.version.outputs.hasChangesets == 'false'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      staged: ${{ steps.changesets.outputs.staged }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'
          cache: 'false'

      - name: Reinstall dependencies (release hardening)
        run: pnpm install --frozen-lockfile --force

      - name: Build
        run: pnpm run build

      - name: Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          publish: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish') && 'pnpm release' || 'pnpm release:stage:ci' }}
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Discord Notification
    needs: [release]
    if: needs.release.outputs.staged == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send a discord notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                content: `A new release is available 🎉. \n [Read the changelog](https://github.com/${context.repo.owner}/${context.repo.repo}/releases)`,
              }),
            })
              .then((res) => {
                console.log('Sent discord notification', res.status);
              })
              .catch((err) => {
                console.error('Error sending discord notification', err);
              });
