name: Release
on:
  push:
    branches: ['main']
    paths:
      - '.changeset/**'
      - 'packages/**'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    if: github.repository_owner == 'stijnvanhulle'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'
          cache: 'false'

      - name: Build
        run: pnpm run build

      # Opens (or updates) a "Version Packages" PR when changesets are present.
      # Merging that PR removes the changesets, which triggers this same
      # workflow again, this time publishing the versioned packages to npm.
      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm version
          publish: pnpm release
          commit: 'ci(changesets): version packages'
          title: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Send Discord Notification
    needs: [release]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send a discord notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        uses: actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            fetch(process.env.DISCORD_WEBHOOK_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                content: `A new release is available 🎉. \n [Read the changelog](https://github.com/${context.repo.owner}/${context.repo.repo}/releases)`,
              }),
            })
              .then((res) => {
                console.log('Sent discord notification', res.status);
              })
              .catch((err) => {
                console.error('Error sending discord notification', err);
              });
