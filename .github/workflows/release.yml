name: Release
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Release mode (version = PR only; staged = stage on npm; publish = release to latest)'
        type: choice
        options: [version, staged, publish]
        default: version
      tag:
        description: 'Optional: Custom tag for canary release'
        required: false
        type: string
  push:
    branches: ['main', 'alpha', 'beta', 'rc']
    paths:
      - '.changeset/**'
      - 'packages/**'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Version Packages
    if: github.repository_owner == 'stijnvanhulle' && github.event.inputs.tag == ''
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'
          cache: 'false'

      - name: Create Version Packages PR
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        with:
          version: pnpm exec changeset version
          commit: 'ci(changesets): version packages'
          title: 'ci(changesets): version packages'
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release
    needs: [version]
    if: |
      always() &&
      github.repository_owner == 'stijnvanhulle' &&
      (github.event.inputs.tag != '' ||
        ((github.event_name != 'workflow_dispatch' || github.event.inputs.mode != 'version') &&
          needs.version.result == 'success' && needs.version.outputs.hasChangesets == 'false'))
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
      issues: write
    outputs:
      staged: ${{ steps.changesets.outputs.staged }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'
          cache: 'false'

      - name: Reinstall dependencies (release hardening)
        run: pnpm install --frozen-lockfile --force

      - name: Build
        run: pnpm run build

      - name: Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1
        if: ${{ github.event.inputs.tag == '' }}
        with:
          publish: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'publish') && 'pnpm release' || 'pnpm release:stage:ci' }}
          setupGitUser: false
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish ${{ inputs.tag || 'canary' }}
        id: canary
        if: ${{ github.event.inputs.tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          RELEASE_TAG: ${{ inputs.tag || 'canary' }}
        run: |
          git checkout main
          pnpm version:canary
          pnpm release:canary --tag "$RELEASE_TAG"

