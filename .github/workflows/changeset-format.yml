name: Format Changeset PR

on:
  pull_request:
    paths:
      - 'CHANGELOG.md'
      - '.changeset/**'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format and Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # Same-repo only: fork PRs cannot run this since git-auto-commit needs
    # contents: write which the read-only fork token does not have. Guarding
    # explicitly also prevents fork code from polluting the cache scope.
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Tools
        uses: ./.github/setup
        with:
          node-version: '22'

      - name: Format
        run: pnpm run format

      - name: Lint Fix
        run: pnpm run lint:fix

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 'chore: format and lint fixes'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
