name: Setup
description: Sets up pnpm, Node, and installs dependencies.

# NOTE: local composite actions cannot call other actions that use a `pre:`
# lifecycle hook. If you want to add `step-security/harden-runner` or
# `rharkor/caching-for-turbo`, add them as steps in each workflow directly,
# BEFORE this composite is invoked.

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: Setup git user
      shell: bash
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
