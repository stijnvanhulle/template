name: Setup
description: Sets up pnpm, Node, dependencies, and Turbo cache.

inputs:
  node-version:
    description: 'Node.js version to use (e.g., 22, 24, or 22.x)'
    required: true
  cache:
    description: 'Cache/build tool to use: "turbo" (default) or "none"'
    required: false
    default: 'turbo'

runs:
  using: composite
  steps:
    - name: Harden runner
      if: runner.os == 'Linux'
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: Setup git user
      shell: bash
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline

    - name: Setup Turbo cache
      if: ${{ inputs.cache == 'turbo' }}
      uses: rharkor/caching-for-turbo@cda201ff2b32699a2ae9f59704db029e3dde4fbd # v2.3.5
      continue-on-error: true
      with:
        cache-prefix: ${{ github.event.repository.name }}_
